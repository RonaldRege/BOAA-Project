<!--html for log in-->

<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CIMS Login</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <h1 class="title">C.I.M.S.</h1>
  <p class="subtitle">Club Inventory Management System</p>

  <div class="box">
    <h2>LOG IN</h2>

    <p id="error" class="error">Wrong username or password. Try again.</p>

    <label>Username</label>
    <input id="user" type="text" placeholder="Enter username" />

    <label>Password</label>
    <input id="pass" type="password" placeholder="Enter password" />

    <button onclick="checkLogin()">LOG IN</button>

    <p class="links">Forgot password</p>
    <p class="links">Create new account</p>

    <p class="demo">Admin login: <b>Admin</b> / <b>cims123</b></p>
    <p class="demo">Board login: <b>Board Member</b> / <b>board123</b></p>
    <p class="demo">Member login: <b>Member</b> / <b>member123</b></p>
  </div>

  <script src="login.js"></script>
</body>

</html>
